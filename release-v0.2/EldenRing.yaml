# ============================================================================
#  ELDEN RING -- Archipelago player config (v0.2)
#
#  Drop this in your Archipelago  Players/  folder and generate.
#
#  THE GAME ID IS `Elden Ring` -- WITH A SPACE.
#  It was `EldenRing` in v0.1. A v0.1 yaml is rejected with:
#      "No world found to handle game EldenRing. Did you mean 'Elden Ring'?"
#  Do NOT retrofit an old yaml. Start from this one. Archipelago SILENTLY
#  IGNORES unknown options, so an old yaml can generate a seed that is not
#  the one you configured, with no error at all.
#
#  Every key below is a REAL option. If you add a key that is not in this
#  file, it will be ignored without warning -- that is Archipelago behaviour,
#  not a bug in this world.
# ============================================================================
#
#  HOW PROGRESSION WORKS (one paragraph, and the options below make sense):
#
#  The world is split into regions, each sealed behind a "<Region> Lock" item
#  in the multiworld pool. Receiving a Lock lights ALL of that region's
#  graces, and you warp in. That is the ONLY way in: vanilla key items and
#  routes gate NOTHING here -- no Rold Medallion for the Mountaintops, no
#  Mohg fight for the DLC. Enter a region whose Lock you do not hold and the
#  client warps you back out. You start at Roundtable Hold with one region
#  already open; the default goal is to hold every Lock in play.
#
#  Two vanilla-flavored exceptions, both ON TOP of the region's own Lock:
#  Raya Lucaria Academy also needs the Academy Glintstone Key (shuffled into
#  the pool; the Academy's graces light when the key arrives), and Leyndell
#  also needs Great Runes (see leyndell_runes_required below).
# ============================================================================

name: Player1
game: Elden Ring
description: Elden Ring -- Archipelago v0.2

Elden Ring:

  # ---- The shape of the run -------------------------------------------------

  # How many regions are in play. 0 = all of them (the full Shattering:
  # 17 base-game regions, or 31 with the DLC enabled). N > 0 seals the rest:
  # a sealed region has no checks, no Lock, and no way in. Each KEPT region
  # opens when its Region Lock item arrives -- its graces light and you warp
  # in. This is the marquee mode: it turns the open world into an Archipelago
  # progression graph. Try 4 for a tight evening run.
  num_regions: 0

  # How the kept regions are chosen when num_regions > 0.
  #   spine  -- the first N of a fixed path (Limgrave first). Predictable.
  #   rolled -- a random N. Wilder.
  # Either way the goal region (Leyndell) is always kept, so the seed is
  # always winnable.
  num_regions_order: spine

  # What the goal requires.
  #   region_locks  -- hold every Region Lock that is in play (default).
  #   great_runes   -- ALSO collect goal_great_runes Great Runes. You must HOLD the
  #                    runes; killing the boss that vanilla-drops one is NOT enough
  #                    (they are shuffled -- the rune is not at its boss).
  ending_condition: region_locks

  # Only used when ending_condition is great_runes. Clamped down to the
  # Great Runes actually reachable this seed, so it can never make a seed
  # unbeatable.
  goal_great_runes: 2

  # Great Runes needed to get into Leyndell, ON TOP of the Leyndell Lock --
  # echoing the vanilla "two Great Runes to enter the capital". The capital's
  # graces light once this many Great Runes have arrived. 0 disables the
  # gate. Clamped down to the runes actually in the pool, so it can never
  # make a seed unbeatable.
  leyndell_runes_required: 2

  # ---- DLC ------------------------------------------------------------------

  # Shadow of the Erdtree. When on, the 14 DLC regions join the pool and
  # behave EXACTLY like base regions: receive the Lock, graces light, warp
  # in. You never fight Mohg or touch the cocoon to get there. Off here
  # because base game only is the recommended v0.2 setup (DLC is
  # experimental).
  enable_dlc: false

  # ONLY the DLC regions are in play. Implies enable_dlc. The whole base
  # game is sealed, and the goal becomes holding every kept DLC Lock.
  dlc_only: false

  # ---- Item pool ------------------------------------------------------------

  # Recipe for the junk-consumable filler tail: {category: weight}.
  # Leave it alone unless you know what you want. Raising `juice` gives you more
  # genuinely useful drops; raising `stones` keeps upgrade materials flowing.
  # The stones / somber_stones / runes weights are an upgrade-economy
  # RESERVATION: they are paid in full before anything else, and a seed that
  # cannot afford them fails at generation instead of shipping a broken
  # upgrade curve. Every seed also guarantees a batch of low-tier smithing
  # stones (regular and somber, enough for an early +3) placed within reach
  # of your starting area. Zero these weights out and that economy is gone --
  # the generator will warn you.
  curated_filler:
    juice: 44
    stones: 27
    somber_stones: 6
    runes: 10
    throwables: 6
    pots: 4
    greases: 3
    foods: 2
    boluses: 1

  # Pool Builder replaces part of the boring Rune filler tail with real gear,
  # best-first by community tier list. These are PERCENTAGES of that tail.
  # All 0 = leave the filler alone. They stack, so keep the total sane.
  pool_builder_pct_weapons: 0
  pool_builder_pct_armor: 0
  pool_builder_pct_talismans: 0
  pool_builder_pct_spells: 0
  pool_builder_pct_ashes_of_war: 0

  # Every Golden Seed and Sacred Tear check pays out a single "Progressive
  # Flask Upgrade" item instead, one-for-one. Each copy you receive grants a
  # seed or a tear on an interleaved schedule -- you still spend it at a grace
  # at the game's own escalating price, but upgrades (Sacred Tears included)
  # arrive on a steady cadence instead of 13 silent flat pickups. Off: seeds
  # and tears stay discrete pickups at their shuffled locations.
  progressive_flasks: true

  # Share of YOUR filler that other players' worlds may draw from, in a
  # multiworld. 100 = fully shared. 0 = keep your filler to yourself.
  filler_foreign_pct: 100

  # On: every real vanilla item this seed produces stays in YOUR world.
  local_item_only: false

  # ---- Where progression may hide -------------------------------------------

  # WHICH LOCATIONS MAY HOLD PROGRESSION. Shrinking this makes the run tighter
  # and more predictable; widening it scatters key items further afield.
  progression_surface:
    - MajorBoss
    - Remembrance
    - GreatRune
    - KeyItem
    - Church
    - Seedtree
    - Fragment
    - Revered
    - ShopSlot

  # In a MULTIWORLD, confine OTHER players' progression to your progression_surface
  # too -- so a foreign key item lands on one of your major-boss / key-item / etc.
  # checks, never on a random filler pickup. On by default. Off = foreign
  # progression scatters across any reachable check of yours (standard AP). No
  # effect in a solo seed. Never blocks generation.
  confine_foreign_progression: true

  # RESERVED. The option exists but is INERT in v0.2 -- shop checks are assumed
  # reachable regardless of what you set here. Left in place so seeds stay
  # forward-compatible; see KNOWN-ISSUES.md. Leave it alone.
  merchant_bell_logic: off

  # ---- Runtime rerolls ------------------------------------------------------

  # Reroll what farmable enemies drop. Their ONE-TIME drops (the actual AP
  # checks) are untouched -- this only changes the repeatable farm drops.
  reroll_enemy_drops: true

  # Reroll every unlimited-stock merchant slot to a random high-impact
  # consumable, priced at what the item is worth. Merchants stop being a wall
  # of Arrows. (Unlimited slots can never be checks -- there is no way to
  # observe a purchase on them -- so nothing is lost by rerolling.)
  reroll_infinite_shop_stock: true

  # ---- Standard Archipelago options -----------------------------------------

  # region_lock seeds want `minimal`, not `full`.
  accessibility: minimal
  progression_balancing: 50

  # Shared deaths in a multiworld. Works in both directions.
  death_link: false


# ============================================================================
#  FIXED IN v0.2 -- these are NOT options. Do not add them to the file above.
#
#  v0.2 froze a large part of the old option surface to one sensible setting
#  each, so the config is something you can actually read. Adding any of these
#  keys does NOTHING -- Archipelago will ignore it silently. Listed here so you
#  know what the game is doing, because it is not always the vanilla behaviour:
#
#    item_shuffle              ON   -- each check pays out a shuffled vanilla item
#    pool_builder              ON
#    pool_builder_intensity    max  -- (not "high")
#    varied_filler             ON
#    dungeon_sweep             all  -- clearing a dungeon's boss sweeps its checks
#    boss_lock_placement       own_region
#    start_with_region_lock    ON   -- you start with one region already open
#    start_with_torch          ON
#    start_with_steed          ON   -- Torrent from the start
#    start_with_flasks         ON
#    reveal_all_maps           ON
#    early_leveling            ON   -- level up without meeting Melina
#    no_weapon_requirements    ON   -- any gear the multiworld sends you is usable
#    buyable_stonesword_keys   ON
#    flatten_regular_upgrades  2    -- a UNIFORM 2-stone ladder, NOT the vanilla 2/4/6
#    completion_scaling_floor  0    -- enemy scaling is always on, keyed to progression
#    global_scadutree_blessing scaled  -- (only relevant with the DLC on)
#
#  `grace_rando` no longer exists at all.
# ============================================================================
