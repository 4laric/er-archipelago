; Project-tuned RandomizerHelper.dll config for ER Archipelago.  (deployed to mods\ by build.ps1 -Helper)
;
; AUTO-EQUIP IS DISABLED here on purpose: the AP client (archipelago.dll, AutoEquip.cpp) already
; auto-equips granted items, so Helper's equip is turned OFF to avoid double-equip conflicts.
; Helper is deployed ONLY for weapon / spirit-ash AUTO-UPGRADE, which the client does not implement.
;
; TWO THINGS TO VERIFY IN-GAME (both currently UNCONFIRMED):
;   1. Where the dll reads this file from when loaded by Elden Mod Loader (next to the dll in mods\,
;      or the game root). If it can't find this file it falls back to its built-in defaults, which
;      have autoEquip=true -> that WOULD conflict with the client. Check RandomizerHelper_log.txt on
;      boot to confirm it loaded THIS config (equip settings = false).
;   2. Whether auto-upgrade fires at all: Helper upgrades on pickup / enemy-drop / shop hooks, but AP
;      grants items via the client's direct inventory write, which may bypass those hooks. If weapons
;      aren't getting leveled on grant, Helper isn't seeing AP items and adds nothing here.
;
; Settings are re-read whenever this file changes (no restart needed).

[settings]

; --- auto-equip: OFF (client handles equip) ---
autoEquip = false
equipShop = false
equipWeapons = false
bowLeft = false
castLeft = false
equipArmor = false
equipAccessory = false
equipSpells = false
equipCrystalTears = false

; --- auto-upgrade: ON (the reason we deploy Helper) ---
autoUpgrade = true
autoUpgradeWeapons = true
regionLockWeapons = false
weaponLevelsBelowMax = 0
weaponLevelRange = 0
autoUpgradeSpiritAshes = true
autoUpgradeDropped = false
