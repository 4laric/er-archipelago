<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elden Ring Archipelago — Options Wizard</title>
<!--
  Single-file yaml options wizard for the Elden Ring Archipelago world.
  Everything below "er-options-metadata" is rendered from JSON extracted straight out of
  worlds/eldenring/options.py by tools/dump_options_metadata.py, so this page cannot
  describe an option that doesn't exist. To refresh after options.py changes:

      python tools/dump_options_metadata.py --presets --inject

  Open from disk (file://) — no install, no server, no build step.
-->
<style>
:root{
  --bg:#131110; --bg2:#1c1917; --panel:#232019; --panel2:#2a261e;
  --gold:#c8a95a; --gold-dim:#8a7440; --text:#e8e0cf; --dim:#9a8f78;
  --err:#e06c5a; --warn:#d9a53f; --info:#7fa8c9; --ok:#8fbf6f;
  --mono:ui-monospace,'Cascadia Code',Consolas,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);
  font:15px/1.5 Georgia,'Times New Roman',serif}
h1,h2,h3{font-weight:normal;color:var(--gold);letter-spacing:.04em}
a{color:var(--gold)}
.wrap{max-width:1180px;margin:0 auto;padding:18px}
header.top{border-bottom:1px solid var(--gold-dim);padding:14px 0 10px;margin-bottom:14px}
header.top h1{margin:0;font-size:26px}
header.top .sub{color:var(--dim);font-size:13px}
.cols{display:flex;gap:18px;align-items:flex-start}
.main{flex:1 1 640px;min-width:0}
.side{flex:0 0 420px;position:sticky;top:12px;max-height:calc(100vh - 24px);
  display:flex;flex-direction:column;gap:10px}
@media (max-width:980px){.cols{flex-direction:column}.side{position:static;flex:1 1 auto;width:100%}}
.card{background:var(--panel);border:1px solid #3a342a;border-radius:8px;padding:14px 16px;margin-bottom:14px}
.presets{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.preset{cursor:pointer;background:var(--panel2);border:1px solid #3a342a;border-radius:8px;
  padding:12px;transition:border-color .15s}
.preset:hover{border-color:var(--gold-dim)}
.preset.sel{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.preset h3{margin:0 0 4px;font-size:16px}
.preset .tag{color:var(--dim);font-size:13px}
.stepnav{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.stepnav button{background:var(--panel2);border:1px solid #3a342a;color:var(--dim);
  border-radius:14px;padding:3px 11px;font:13px Georgia,serif;cursor:pointer}
.stepnav button.cur{border-color:var(--gold);color:var(--gold)}
.stepnav button.touched{color:var(--text)}
.grouphead{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid #3a342a;
  padding-bottom:6px;margin-bottom:8px}
.grouphead h2{margin:0;font-size:20px}
.grouphead .count{color:var(--dim);font-size:12px}
.opt{padding:12px 4px;border-bottom:1px dotted #33301f}
.opt:last-child{border-bottom:none}
.opt .head{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px}
.opt .dname{font-size:16px;color:var(--text)}
.opt.mod .dname{color:var(--gold)}
.opt .key{font:12px var(--mono);color:var(--dim)}
.opt .modbadge{font-size:11px;color:var(--gold);border:1px solid var(--gold-dim);
  border-radius:9px;padding:0 7px}
.opt .reset{font-size:11px;color:var(--dim);background:none;border:none;cursor:pointer;text-decoration:underline}
.opt .desc{color:var(--dim);font-size:13.5px;margin:4px 0 8px;white-space:pre-line}
.opt details.more{margin:-4px 0 8px}
.opt details.more summary{color:var(--gold-dim);font-size:12.5px;cursor:pointer}
.opt details.more .desc{margin-top:4px}
.ctl{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.ctl label.choice{display:inline-flex;align-items:center;gap:5px;background:var(--panel2);
  border:1px solid #3a342a;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:14px}
.ctl label.choice:has(input:checked){border-color:var(--gold);color:var(--gold)}
.ctl input[type=radio],.ctl input[type=checkbox]{accent-color:var(--gold)}
.ctl select,.ctl input[type=number],.ctl input[type=text]{background:var(--bg2);color:var(--text);
  border:1px solid #3a342a;border-radius:6px;padding:5px 8px;font:14px var(--mono)}
.ctl input[type=range]{flex:1 1 160px;accent-color:var(--gold)}
.ctl .bounds{color:var(--dim);font:12px var(--mono)}
.toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.toggle input{width:36px;height:20px;appearance:none;background:#3a342a;border-radius:10px;
  position:relative;cursor:pointer;transition:background .15s}
.toggle input:checked{background:var(--gold-dim)}
.toggle input::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;
  border-radius:50%;background:var(--text);transition:left .15s}
.toggle input:checked::after{left:18px}
.toggle .tv{font:13px var(--mono);color:var(--dim)}
.setgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:4px}
.navbtns{display:flex;justify-content:space-between;margin-top:10px}
.navbtns button,.bigbtn{background:var(--panel2);color:var(--gold);border:1px solid var(--gold-dim);
  border-radius:6px;padding:8px 20px;font:15px Georgia,serif;cursor:pointer}
.navbtns button:hover,.bigbtn:hover{border-color:var(--gold)}
.navbtns button:disabled{opacity:.35;cursor:default}
.yamlbox{background:var(--bg2);border:1px solid #3a342a;border-radius:8px;padding:10px;
  overflow:auto;flex:1 1 auto;min-height:180px}
.yamlbox pre{margin:0;font:12.5px/1.45 var(--mono);color:#cfc6ad;white-space:pre}
.yamlbox .yk{color:var(--gold)}
.yamlbox .yc{color:#6f6753}
.sidebtns{display:flex;gap:8px}
.sidebtns button{flex:1}
.findings{overflow:auto;max-height:30vh}
.finding{font-size:13px;margin:6px 0;padding-left:10px;border-left:3px solid var(--dim)}
.finding.error{border-color:var(--err)} .finding.error b{color:var(--err)}
.finding.warn{border-color:var(--warn)} .finding.warn b{color:var(--warn)}
.finding.info{border-color:var(--info)} .finding.info b{color:var(--info)}
.finding .fk{font:12px var(--mono);color:var(--dim)}
.allgood{color:var(--ok);font-size:13px}
.namerow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.namerow input{font-size:16px;min-width:220px}
.namerow .err{color:var(--err);font-size:13px}
.small{font-size:12.5px;color:var(--dim)}
footer{color:#6f6753;font-size:12px;border-top:1px solid #3a342a;margin-top:20px;padding-top:8px}
.hidden{display:none}
.advgate{color:var(--dim)}
</style>
</head>

<script id="wizard-core">
/* wizard-core: PURE logic, no DOM. Testable under node by extracting this block.
   API: ERW.loadMeta(json) -> meta; ERW.buildYaml(meta, state) -> string;
        ERW.findings(meta, state) -> [{sev,key,msg}]; ERW.getVal / setVal / pretty. */
const ERW = (() => {
  const AP_CORE = [
    // Stable Archipelago-core options (not ER surface; kept minimal on purpose).
    { key:"accessibility", kind:"choice", display_name:"Accessibility", core:true,
      choices:[{name:"full"},{name:"minimal"}], default:"full",
      description:"How much of the world must stay reachable.\nfull: every location can " +
        "be reached in logic. minimal: only enough to finish your goal — tight or " +
        "region-locked pools generate more reliably here." },
    { key:"progression_balancing", kind:"range", display_name:"Progression Balancing", core:true,
      range:{start:0,end:99}, default:50,
      description:"How hard Archipelago tries to move your progression items earlier in " +
        "the multiworld (0 = off, 99 = max). Leave at 50 unless you know you want otherwise." },
  ];

  function loadMeta(json){
    const meta = JSON.parse(JSON.stringify(json));
    meta.byKey = {};
    for (const o of meta.options) meta.byKey[o.key] = o;
    for (const o of AP_CORE) meta.byKey[o.key] = o;
    meta.apCore = AP_CORE;
    return meta;
  }

  const pretty = n => String(n).split("_").map(w => w ? w[0].toUpperCase()+w.slice(1) : w).join(" ");

  function newState(){
    return { name:"Player", presetId:null, presetTitle:"Defaults", values:{} };
  }
  function applyPreset(meta, state, presetId){
    state.values = {};
    state.presetId = presetId; state.presetTitle = "Defaults";
    const p = meta.presets.find(p => p.id === presetId);
    if (p){ state.presetTitle = p.title;
      for (const [k,v] of Object.entries(p.values)) if (meta.byKey[k]) state.values[k] = v; }
    return state;
  }

  function getVal(meta, state, key){
    if (key in state.values) return state.values[key];
    const o = meta.byKey[key];
    return o ? o.default : undefined;
  }
  function eq(a, b){
    if (Array.isArray(a) && Array.isArray(b))
      return a.length === b.length && [...a].sort().every((x,i) => x === [...b].sort()[i]);
    return a === b;
  }
  function isDefault(meta, state, key){
    const o = meta.byKey[key];
    return !o || eq(getVal(meta, state, key), o.default);
  }
  function setVal(meta, state, key, v){
    const o = meta.byKey[key];
    if (o && eq(v, o.default) && !(state.presetId &&
        (meta.presets.find(p=>p.id===state.presetId)||{values:{}}).values[key] !== undefined))
      delete state.values[key];
    else state.values[key] = v;
  }
  function deviations(meta, state){
    const out = [];
    const order = meta.field_order.concat(meta.apCore.map(o => o.key));
    for (const k of order)
      if (k in state.values && !isDefault(meta, state, k)) out.push(k);
    return out;
  }

  function yamlScalar(v){
    if (typeof v === "boolean") return v ? "true" : "false";
    if (typeof v === "number") return String(v);
    return '"' + String(v).replace(/\\/g,"\\\\").replace(/"/g,'\\"') + '"';
  }
  function sanitizeName(n){
    n = (n || "").trim().replace(/[{}]/g, "");
    return n.slice(0, 16) || "Player";
  }

  function buildYaml(meta, state){
    const devs = deviations(meta, state);
    const date = new Date().toISOString().slice(0, 10);
    const L = [];
    // name + description are QUOTED: free text can contain ": " which is a yaml
    // mapping bomb inside an unquoted scalar (found by the lint harness).
    L.push("name: " + yamlScalar(sanitizeName(state.name)));
    L.push("description: " + yamlScalar("generated by the ER options wizard " + date +
           " (preset: " + state.presetTitle + ")"));
    L.push("game: EldenRing");
    L.push("");
    if (!devs.length){
      L.push("EldenRing: {}   # all options at their defaults");
    } else {
      L.push("EldenRing:");
      for (const k of devs){
        const o = meta.byKey[k];
        const v = getVal(meta, state, k);
        const line = Array.isArray(v)
          ? "  " + k + ": [" + v.map(yamlScalar).join(", ") + "]"
          : "  " + k + ": " + yamlScalar(v);
        const dflt = Array.isArray(o.default) ? "[" + o.default.join(", ") + "]" : String(o.default);
        L.push(line + "   # " + o.display_name + " (default: " + dflt + ")");
      }
    }
    L.push("");
    return L.join("\n");
  }

  /* ---- interaction checks, ported from er_yaml_lint.py. Every rule guards on the
     option keys still existing in the metadata, so a deleted option silently
     deactivates its rule instead of describing a ghost. ---- */
  function findings(meta, state){
    const has = k => !!meta.byKey[k];
    const v = k => getVal(meta, state, k);
    const set = k => (k in state.values);
    const out = [];
    const err  = (k,m) => out.push({sev:"error",key:k,msg:m});
    const warn = (k,m) => out.push({sev:"warn", key:k,msg:m});
    const info = (k,m) => out.push({sev:"info", key:k,msg:m});

    const goal = has("ending_condition") ? v("ending_condition") : null;
    const wl = has("world_logic") ? v("world_logic") : null;
    const lockBased = wl === "region_lock" || wl === "region_lock_bosses";
    const nr = has("num_regions") ? v("num_regions") : 0;
    const sealGoal = ["capital","messmer","godrick"].includes(goal) || nr > 0;
    const dlcOnly = has("dlc_only") && v("dlc_only");

    if (goal === "messmer"){
      if (has("dlc_only") && set("dlc_only") && !v("dlc_only"))
        warn("dlc_only", "Ending Messmer FORCES DLC Only on — your 'false' is overridden.");
      if (has("messmer_kindle") && v("messmer_kindle"))
        warn("messmer_kindle", "Forced off under the Messmer ending (Enir Ilim is sealed).");
    }
    if (goal === "godrick"){
      if (dlcOnly) warn("dlc_only", "Ending Godrick FORCES DLC Only off — your 'true' is overridden.");
      if (wl === "open_world")
        err("world_logic", "Ending Godrick needs a lock-based World Logic (region_lock / region_lock_bosses).");
    }
    if (dlcOnly && has("enable_dlc") && set("enable_dlc") && !v("enable_dlc"))
      info("enable_dlc", "DLC Only forces Enable DLC on — your 'false' is overridden.");

    if (has("random_start_region") && v("random_start_region") !== "off"){
      if (!lockBased)
        err("random_start_region", "Requires a lock-based World Logic (you have " + wl + ").");
      if (sealGoal)
        warn("random_start_region", "Ignored under a region-seal goal (capital / messmer / godrick / num_regions) — you'll start at The First Step. For num_regions runs: num_regions_chain: true gives a rolled start instead.");
      if (dlcOnly)
        warn("random_start_region", "Inert under DLC Only — Gravesite is the fixed start hub.");
    }

    if (!dlcOnly){
      for (const k of ["quick_start","dlc_only_rune_catchup"])
        if (has(k) && v(k)) warn(k, "Inert unless DLC Only is on.");
    }
    const dlcOn = (has("enable_dlc") && v("enable_dlc")) || dlcOnly || goal === "messmer";
    if (!dlcOn){
      if (has("scadu_frontload") && set("scadu_frontload") && v("scadu_frontload") !== meta.byKey["scadu_frontload"].default)
        warn("scadu_frontload", "Only meaningful with the DLC on.");
      if (has("dlc_timing") && set("dlc_timing"))
        warn("dlc_timing", "Only meaningful with the DLC on.");
    }

    if (has("extra_region_locks") && v("extra_region_locks").length && !lockBased)
      warn("extra_region_locks", "Inert without a lock-based World Logic.");

    if (nr > 0){
      if (goal !== "capital") warn("num_regions", "Only takes effect with ending_condition: capital.");
      if (!lockBased) warn("num_regions", "Only takes effect with a lock-based World Logic.");
      if (has("num_regions_order") && v("num_regions_order") === "spine" &&
          has("num_regions_rune_source") && v("num_regions_rune_source") === "pool")
        warn("num_regions_rune_source", "Ignored under spine ordering (pool rolls a random set).");
      if (nr < 3) info("num_regions", "Below the structural floor — raised to 3 at generation (Limgrave + Leyndell + Altus).");
      if (has("great_runes_required") && v("great_runes_required") > 4)
        err("great_runes_required", "num_regions runs can satisfy at most 4 great runes — generation rejects this.");
    } else {
      if (has("num_regions_order") && v("num_regions_order") === "spine")
        warn("num_regions_order", "Spine ordering set but num_regions is 0 (nothing to keep).");
      if (has("num_regions_rune_source") && v("num_regions_rune_source") === "pool")
        warn("num_regions_rune_source", "Inert unless num_regions > 0.");
      if (has("num_regions_chain") && v("num_regions_chain"))
        warn("num_regions_chain", "Inert unless num_regions > 0.");
    }
    if (has("num_regions_chain") && v("num_regions_chain") && nr > 0 && goal !== "capital")
      warn("num_regions_chain", "Only takes effect with ending_condition: capital.");

    if (has("dlc_only_chain") && v("dlc_only_chain") && goal !== "messmer")
      warn("dlc_only_chain", "Phase 1 only acts under ending_condition: messmer — plain DLC Only warns and no-ops.");

    if (has("completion_scaling_floor") && v("completion_scaling_floor") > 0 &&
        has("completion_scaling") && v("completion_scaling") === "off")
      warn("completion_scaling_floor", "Inert without Completion Scaling on.");

    if (has("soft_progression") && v("soft_progression") && v("accessibility") === "minimal")
      warn("soft_progression", "No effect under accessibility: minimal.");

    if (has("grace_rando") && v("grace_rando") && lockBased &&
        has("graces_per_region") && set("graces_per_region") &&
        v("graces_per_region") !== meta.byKey["graces_per_region"].default)
      info("graces_per_region", "Grace Rando (on) overrides the graces_per_region bundle — set grace_rando: false to use it.");

    if (has("location_pool") && v("location_pool") === "trimmed"){
      for (const k of ["excluded_location_behavior","missable_location_behavior"])
        if (has(k) && v(k) === "forbid_useful")
          warn(k, "Known generation failure with the Trimmed pool: it can run out of pure filler for excluded/missable locations (FillError: 'not enough filler items'). Set this to allow_useful.");
    }

    if (v("accessibility") === "full" &&
        (sealGoal || (has("extra_region_locks") && v("extra_region_locks").length)))
      info("accessibility", "full can fail generation on tight / region-locked pools; minimal lets them spill.");

    return out;
  }

  return { loadMeta, newState, applyPreset, getVal, setVal, isDefault, deviations,
           buildYaml, findings, pretty, sanitizeName, AP_CORE };
})();
if (typeof module !== "undefined") module.exports = ERW;
</script>
<script>
(() => {
  const raw = JSON.parse(document.getElementById("er-options-metadata").textContent);
  if (!raw.options){ document.getElementById("main").innerHTML =
    "<div class='card'>Metadata not inlined yet — run <code>python tools/dump_options_metadata.py --inject</code>.</div>"; return; }
  const meta = ERW.loadMeta(raw);
  const state = ERW.newState();
  const touched = new Set();

  /* ---- steps: welcome, one per open group, one Advanced (collapsed groups +
     ungrouped options + AP-core), one Finish ---- */
  const openGroups = meta.groups.filter(g => !g.collapsed);
  const advanced = [].concat(
    meta.groups.filter(g => g.collapsed).map(g => ({name:g.name, options:g.options})),
    meta.ungrouped.length ? [{name:"Other Options", options:meta.ungrouped}] : [],
    [{name:"Archipelago Core", options:meta.apCore.map(o => o.key)}]);
  const steps = [{id:"welcome", title:"Start"}]
    .concat(openGroups.map(g => ({id:"g:"+g.name, title:g.name, options:g.options})))
    .concat([{id:"advanced", title:"Advanced"}, {id:"finish", title:"Finish"}]);
  let cur = 0;

  const $ = sel => document.querySelector(sel);
  const el = (tag, cls, html) => { const e = document.createElement(tag);
    if (cls) e.className = cls; if (html !== undefined) e.innerHTML = html; return e; };
  const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  function descBlocks(o){
    const paras = o.description.split(/\n\s*\n/);
    const first = paras[0], rest = paras.slice(1).join("\n\n");
    let h = "<div class='desc'>" + esc(first) + "</div>";
    if (rest.trim())
      h += "<details class='more'><summary>more…</summary><div class='desc'>" +
           esc(rest) + "</div></details>";
    return h;
  }

  function controlFor(o){
    const wrap = el("div", "ctl");
    const v = ERW.getVal(meta, state, o.key);
    const commit = nv => { ERW.setVal(meta, state, o.key, nv); touched.add(o.key); refresh(); };
    if (o.kind === "choice"){
      if (o.choices.length <= 5){
        for (const c of o.choices){
          const lab = el("label", "choice");
          const r = Object.assign(document.createElement("input"),
            {type:"radio", name:"r_"+o.key, checked:v === c.name});
          r.addEventListener("change", () => commit(c.name));
          lab.append(r, document.createTextNode(ERW.pretty(c.name)));
          wrap.append(lab);
        }
      } else {
        const sel = document.createElement("select");
        for (const c of o.choices){
          const op = new Option(ERW.pretty(c.name), c.name, false, v === c.name);
          sel.append(op);
        }
        sel.addEventListener("change", () => commit(sel.value));
        wrap.append(sel);
      }
    } else if (o.kind === "toggle"){
      const lab = el("label", "toggle");
      const cb = Object.assign(document.createElement("input"), {type:"checkbox", checked:!!v});
      const tv = el("span", "tv", v ? "on" : "off");
      cb.addEventListener("change", () => commit(cb.checked));
      lab.append(cb, tv);
      wrap.append(lab);
    } else if (o.kind === "range"){
      const {start, end} = o.range;
      const sl = Object.assign(document.createElement("input"),
        {type:"range", min:start, max:end, value:v});
      const num = Object.assign(document.createElement("input"),
        {type:"number", min:start, max:end, value:v});
      num.style.width = "80px";
      sl.addEventListener("input", () => { num.value = sl.value; commit(+sl.value); });
      num.addEventListener("change", () => {
        let n = Math.max(start, Math.min(end, +num.value || start));
        num.value = n; sl.value = n; commit(n);
      });
      wrap.append(sl, num, el("span", "bounds", start + "–" + end + " (default " + o.default + ")"));
    } else if (o.kind === "set" || o.kind === "list"){
      const grid = el("div", "setgrid");
      for (const k of o.valid_keys){
        const lab = el("label", "choice");
        const cb = Object.assign(document.createElement("input"),
          {type:"checkbox", checked:v.includes(k)});
        cb.addEventListener("change", () => {
          const curv = new Set(ERW.getVal(meta, state, o.key));
          cb.checked ? curv.add(k) : curv.delete(k);
          commit(o.valid_keys.filter(x => curv.has(x)));
        });
        lab.append(cb, document.createTextNode(k));
        grid.append(lab);
      }
      grid.style.flex = "1 1 100%";
      wrap.append(grid);
    } else {
      const t = Object.assign(document.createElement("input"), {type:"text", value:v});
      t.addEventListener("change", () => commit(t.value));
      wrap.append(t);
    }
    return wrap;
  }

  function optRow(o){
    const mod = !ERW.isDefault(meta, state, o.key);
    const row = el("div", "opt" + (mod ? " mod" : ""));
    const head = el("div", "head");
    head.append(el("span", "dname", esc(o.display_name)),
                el("span", "key", esc(o.key)));
    if (mod){
      head.append(el("span", "modbadge", "changed"));
      const rb = el("button", "reset", "reset to default");
      rb.addEventListener("click", () => { delete state.values[o.key]; refresh(); });
      head.append(rb);
    }
    row.append(head);
    row.insertAdjacentHTML("beforeend", descBlocks(o));
    row.append(controlFor(o));
    return row;
  }

  function renderStep(){
    const main = $("#main");
    main.innerHTML = "";
    const nav = el("div", "stepnav");
    steps.forEach((st, i) => {
      const b = el("button", (i === cur ? "cur" : "") , esc(st.title));
      b.addEventListener("click", () => { cur = i; renderStep(); });
      nav.append(b);
    });
    main.append(nav);
    const step = steps[cur];

    if (step.id === "welcome"){
      const c1 = el("div", "card",
        "<h2>What is this?</h2><div class='desc' style='color:var(--dim)'>" +
        "<a href='https://archipelago.gg'>Archipelago</a> shuffles the items of many games " +
        "into one shared multiworld — your Elden Ring checks can hold anyone's items, and " +
        "yours can be found by others (solo works too). A <b>yaml</b> file is how you tell " +
        "the generator who you are and which options you want. This wizard writes that " +
        "file for you: pick a starting point, adjust what you care about, download. Only " +
        "the options you change are written, so your yaml stays small and readable.</div>");
      const nameCard = el("div", "card");
      nameCard.innerHTML = "<h2>Your player name</h2><div class='small'>Shown to other " +
        "players in the multiworld. Up to 16 characters.</div>";
      const nr = el("div", "namerow");
      const inp = Object.assign(document.createElement("input"),
        {type:"text", value:state.name, maxLength:16});
      inp.addEventListener("input", () => { state.name = inp.value; refresh(); });
      nr.append(inp);
      nameCard.append(nr);
      const pc = el("div", "card");
      pc.innerHTML = "<h2>Pick a starting point</h2>";
      const grid = el("div", "presets");
      const cards = [{id:null, title:"Defaults", tagline:"Blank slate — every option at its default.",
                      description:"The full base-game experience, untouched."}]
                    .concat(meta.presets);
      for (const p of cards){
        const d = el("div", "preset" + ((state.presetId === p.id) ? " sel" : ""));
        d.innerHTML = "<h3>" + esc(p.title) + "</h3><div class='tag'>" + esc(p.tagline) +
          "</div><details class='more'><summary>details</summary><div class='desc'>" +
          esc(p.description) + "</div></details>";
        d.addEventListener("click", ev => {
          if (ev.target.closest("details")) return;
          ERW.applyPreset(meta, state, p.id); refresh(); renderStep();
        });
        grid.append(d);
      }
      pc.append(grid);
      main.append(c1, nameCard, pc);
    } else if (step.id === "advanced"){
      const gate = el("div", "card advgate",
        "<h2>Advanced &amp; experimental</h2><div class='desc'>Everything here is safe to " +
        "skip — the defaults are fine. Open a section only if you're chasing something " +
        "specific.</div>");
      main.append(gate);
      for (const g of advanced){
        const det = el("details", "card");
        det.innerHTML = "<summary style='cursor:pointer;color:var(--gold)'>" + esc(g.name) +
          " <span class='small'>(" + g.options.length + ")</span></summary>";
        for (const k of g.options){ const o = meta.byKey[k]; if (o) det.append(optRow(o)); }
        main.append(det);
      }
    } else if (step.id === "finish"){
      const done = el("div", "card");
      const devs = ERW.deviations(meta, state);
      done.innerHTML = "<h2>Done — run it</h2><div class='desc'>" +
        "Your yaml (right panel) changes <b>" + devs.length + "</b> option" +
        (devs.length === 1 ? "" : "s") + " from the defaults.\n\n" +
        "1. <b>Download</b> it (or Copy into a new text file ending in .yaml).\n" +
        "2. Drop the file into your Archipelago <b>Players/</b> folder.\n" +
        "3. Generate (ArchipelagoGenerate, or your host's site) and start the Elden Ring " +
        "client.\n\nFix anything red in Checks first — red means generation will reject " +
        "the file.</div>";
      main.append(done);
    } else {
      const g = openGroups.find(g => "g:" + g.name === step.id);
      const card = el("div", "card");
      const changed = g.options.filter(k => !ERW.isDefault(meta, state, k)).length;
      card.append(el("div", "grouphead",
        "<h2>" + esc(g.name) + "</h2><span class='count'>" + g.options.length +
        " options" + (changed ? " · " + changed + " changed" : "") + "</span>"));
      for (const k of g.options){ const o = meta.byKey[k]; if (o) card.append(optRow(o)); }
      main.append(card);
    }

    const btns = el("div", "navbtns");
    const back = el("button", "", "‹ Back");
    back.disabled = cur === 0;
    back.addEventListener("click", () => { cur--; renderStep(); });
    const next = el("button", "", cur === steps.length - 1 ? "Done" : "Next ›");
    next.disabled = cur === steps.length - 1;
    next.addEventListener("click", () => { cur++; renderStep(); });
    btns.append(back, next);
    main.append(btns);
    window.scrollTo({top:0});
  }

  function highlightYaml(y){
    return esc(y)
      .replace(/^([\w#][^:\n]*):/gm, "<span class='yk'>$1</span>:")
      .replace(/(#[^\n]*)/g, "<span class='yc'>$1</span>");
  }

  function refresh(){
    const y = ERW.buildYaml(meta, state);
    $("#yamlout").innerHTML = highlightYaml(y);
    const devs = ERW.deviations(meta, state);
    $("#devcount").textContent = "· " + devs.length + " change" + (devs.length === 1 ? "" : "s") +
      " from defaults · preset: " + state.presetTitle;
    const fs = ERW.findings(meta, state);
    const box = $("#findings");
    box.innerHTML = fs.length ? "" : "<div class='allgood'>No conflicts found.</div>";
    for (const f of fs){
      box.append(el("div", "finding " + f.sev,
        "<b>" + f.sev.toUpperCase() + "</b> <span class='fk'>" + esc(f.key) + "</span> — " +
        esc(f.msg)));
    }
  }

  $("#copybtn").addEventListener("click", async () => {
    const y = ERW.buildYaml(meta, state);
    let ok = false;
    try { await navigator.clipboard.writeText(y); ok = true; } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = y; document.body.append(ta); ta.select();
      try { ok = document.execCommand("copy"); } catch (e2) {}
      ta.remove();
    }
    $("#copymsg").textContent = ok ? "Copied." : "Copy failed — select the text manually.";
    setTimeout(() => $("#copymsg").textContent = "", 2500);
  });
  $("#dlbtn").addEventListener("click", () => {
    const y = ERW.buildYaml(meta, state);
    const fn = ERW.sanitizeName(state.name).replace(/[^\w.-]+/g, "_") + "-EldenRing.yaml";
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([y], {type:"text/yaml"}));
    a.download = fn; a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    $("#copymsg").textContent = "Saved " + fn + " — put it in your Players/ folder.";
  });

  $("#foot").innerHTML = "Rendered from <code>" + esc(raw.source) + "</code> (" +
    raw.options.length + " options, sha " + esc(raw.source_sha256.slice(0, 12)) +
    "…). Regenerate with <code>python tools/dump_options_metadata.py --presets --inject</code>. " +
    "Validate with <code>python er_yaml_lint.py &lt;your yaml&gt;</code>.";

  refresh();
  renderStep();
})();
</script>
</body>
</html>
