# ============================================================================
#  GREENFIELD ELDEN RING -- "The Shattering" playtest  (matt-free apworld)
# ============================================================================
#  game MUST match the installed world. On CURRENT code that is
#  "Elden Ring (Greenfield)". After patch_gf_rename_and_version.py is applied on
#  Windows (v0.2 rename) it becomes "EldenRing" -- update the two game lines below
#  AND rebuild the client (cargo) so its Connect string matches, or it won't connect.
#
#  These are GREENFIELD's options -- a smaller, different set than the release
#  apworld. Do NOT copy release options here (quick_start / curated_fill /
#  world_logic / region_access / no_spirit_ashes / *_location_behavior are NOT
#  valid and will error). ending_condition is region_locks|great_runes (not "capital").
#
#  Only ONE yaml in greenfield\players\ = a solo seed. Two+ = a multiworld.
#  To run this: copy it over greenfield\players\Greenfield.yaml (or clear players\ first).
# ============================================================================
name: Alaric
description: Greenfield ER -- Shattering (item-shuffle, 4 regions, region-lock goal)
game: "Elden Ring (Greenfield)"

"Elden Ring (Greenfield)":

  # ---- The Shattering (the headline) --------------------------------------
  num_regions: 4               # majors in play (+ Roundtable hub always kept); rest sealed. 0 = all 22.
  num_regions_order: rolled    # spine = Limgrave-first fixed path; rolled = N random majors.
  ending_condition: region_locks   # goal = hold every kept region's lock. (great_runes = also require N Great Runes)

  # ---- Real item randomizer -----------------------------------------------
  item_shuffle: true           # each check pays out its real vanilla ER item, shuffled (98.9%; the rest give Rune)
  pool_builder: true           # scrub the Rune tail, inject rare/legendary juice
  pool_builder_juice_cap: 0    # 0..400; 0 = auto-size to the whole Rune tail
  pool_builder_intensity: max  # normal | high (default) | max -- rarity floor legendary-only | +rare | +B-tier
  curated_fill: true
  boss_keys: true


  # ---- Boss locks / dungeon sweeps ----------------------------------------
  dungeon_sweep: all           # kill a dungeon boss -> its other checks auto-register.
                               # REQUIRES the P3b client handler (patch_p3b_client.py) in the built DLL,
                               # else sweeps silently never fire. all | minidungeons | bosses | none.
  boss_lock_placement: own_region   # INERT today (mode B / sweepLockGates not shipped -- no effect this seed).
  # NOTE: mode-A "Felled: <Boss>" trophies now emit in slot_data (base bosses only) but are NOT yet
  # shown in-game -- the client glue in WIRING-boss-locks-v0.2.md must be wired + rebuilt first.
  # enable_dlc:false below keeps this base-only, which matches mode A's scope.

  # ---- Warp-in ------------------------------------------------------------
  grace_rando: false           # bundle: a region lock lights ALL its graces. true = freebie (one grace + scatter items)
  attunement_gate: false

  # ---- QoL / difficulty ---------------------------------------------------
  start_with_torch: true       # begin holding a Torch (dark caves navigable before your first grace)
  no_weapon_requirements: true # any received gear usable on any build
  start_with_region_lock: true # start at Roundtable with one random region already unlocked
  completion_scaling_floor: 0  # 0..50; raise to lift the early-region difficulty floor
  global_scadutree_blessing: off  # off | player_only | scaled (DLC blessing scope)
  stone_ramp: true
  flatten_regular_upgrades: 3  # 0 = vanilla stone cost (2/4/6); 1..4 = graduated stones/level (3 = tuned curve).
                               # (Replaces the invalid 'flatten_smithing_stones'. 'auto_upgrade' is not a
                               #  player option -- it's a hardwired contract constant, so it was removed.)

  # ---- DLC / multiplayer --------------------------------------------------
  enable_dlc: false            # base game only (recommended); enable_dlc/dlc_only gate the DLC regions
  dlc_only: false
  death_link: false            # true = shared deaths (2-player)

  # ---- Archipelago common -------------------------------------------------
  accessibility: minimal
  progression_balancing: 50
