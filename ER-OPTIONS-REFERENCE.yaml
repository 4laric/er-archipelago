# =============================================================================
#  ELDEN RING ARCHIPELAGO -- MASTER OPTIONS REFERENCE
#  Every option, grouped as in options.py, with DEFAULT + one-liner + the
#  gotchas that bite: REQUIRES (won't work without), INERT (silently ignored),
#  CONFLICTS (fights another setting). Copy what you need into a Players yaml.
#  Generated from worlds/eldenring/options.py -- keep in sync if you edit it.
#  Skip to the bottom for the CONFLICT CHEAT-SHEET (the stuff that wasted hours).
# =============================================================================

name: Alaric
description: master reference -- not a playable slot
game: EldenRing

EldenRing:

  # --- Core (Archipelago common) ---------------------------------------------
  accessibility: full            # full | minimal. minimal = only the goal must be reachable
                                 #   (lets tight region-locked pools spill). full force-fills junk -> FillError on tight pools.
  progression_balancing: 50      # 0..99. solo playtest -> set 0 (no reshuffle)

  # --- Goal & World Logic -----------------------------------------------------
  ending_condition: final_boss   # final_boss | elden_beast | all_remembrances | all_bosses | capital | messmer | godrick
                                 #   capital  = reach Leyndell, kill Morgott (short run; pairs w/ num_regions)
                                 #   messmer  = DLC mini-campaign; FORCES dlc_only ON; forces messmer_kindle OFF
                                 #   godrick  = shortest base run; FORCES dlc_only OFF; needs lock-based world_logic
  world_logic: region_lock       # region_lock | region_bosses | region_lock_bosses | open_world
                                 #   NOTE: "lock-based" below = region_lock OR region_lock_bosses
  region_boss_percent: 50        # 1..100. % of a region's bosses to open the next. REQUIRES region_bosses/region_lock_bosses
  soft_logic: true               # (DefaultOn) early access allowed but not logically expected
  region_access: geographic      # geographic | warp. warp = a region's OWN lock is enough (fast-travel in).
                                 #   REQUIRES region gating; several features auto-force this to warp (num_regions, random_start_region)
  extra_region_locks: []         # opt-in finer locks; lock-based logic only. keys: stormhill, godrick, castle_morne,
                                 #   limgrave_underground (alias: limgrave_caves), liurnia_caves, altus_caves,
                                 #   mountaintops_caves, dlc_catacombs(DLC), chokepoint_locks, snowfield

  # --- Great Runes ------------------------------------------------------------
  great_runes_required: 2        # 1..7 runes to enter Leyndell. INERT under region_lock (gate is the lock, not runes)
  great_runes_final_boss: 0      # 0..7 extra runes to reach Radagon/Elden Beast. 0 = none
  great_runes_mountaintops: 0    # 0..7 extra runes for Mountaintops (on top of Rold). 0 = none

  # --- Short Runs (Capital) ---------------------------------------------------
  #  num_regions is the one short-run knob; num_regions_order picks HOW the kept set is chosen.
  #  REQUIRES ending_condition: capital + lock-based world_logic.
  num_regions: 0                 # 0=off. keep N majors (Limgrave + Leyndell always kept + count toward N)
  num_regions_order: rolled      # rolled | spine. rolled = roll N majors (FORCES region_access: warp);
                                 #   spine = fixed first-N spine (Limgrave..Volcano), geographic (the old region_count)
  num_regions_rune_source: regions  # regions | pool. pool = runes injected as items, Limgrave becomes a normal locked
                                 #   region, hub moves to Roundtable (you can spawn outside Limgrave). REQUIRES num_regions>0
  num_regions_chain: false       # breadcrumb the kept regions into a 1..N line (sphere ramp). REQUIRES num_regions>0 + capital
  graces_per_region: 3           # 0..12 graces lit per region-lock. 0=all. REQUIRES region gating.
                                 #   CONFLICTS: grace_rando (on by default) REPLACES this bundle -- set grace_rando:false to use it
  grace_rando: true              # (DefaultOn, region gating only) lock lights 1 random grace; rest drop as in-region checks

  # --- Start ------------------------------------------------------------------
  random_start_region: "off"       # off | overworld | any_major. roll a non-Limgrave start hub. forces region_access: warp.
                                 #   REQUIRES lock-based logic. INERT under dlc_only AND any seal goal (capital/num_regions/messmer/godrick)
  start_region_freebie: to_limgrave  # hub_only | to_limgrave. INERT unless random_start_region actually rolls
  early_leveling: false          # level at graces from start, skip Melina. NOTE: also force-grants Torrent
  random_start: true             # (DefaultOn) randomize the starting equipment loadout
  torrent_start: auto            # auto | on | off. auto = grant when Melina hand-off is bypassed. QUOTE 'on'/'off' in yaml!

  # --- DLC --------------------------------------------------------------------
  enable_dlc: false              # enable Shadow of the Erdtree
  dlc_only: false                # only DLC holds checks (base kept for traversal). FORCES enable_dlc ON
  dlc_timing: "off"                # early | off | late. how soon the DLC entry medal can be needed
  scadu_frontload: 8             # 0..50 Scadutree Fragments biased into sphere 1. REQUIRES DLC on
  messmer_kindle: false          # Messmer Kindle Shards gate Enir Ilim. FORCED OFF under ending_condition: messmer
  messmer_kindle_required: 5     # 2..15 shards needed
  messmer_kindle_max: 10         # 2..15 shards that exist
  dlc_only_chain: false          # breadcrumb the DLC slice into a line. Phase 1: ONLY under messmer goal; plain dlc_only warns+noops

  # --- DLC-Only Catch-up ------------------------------------------------------
  quick_start: false             # grant ~RL120 in Lord's Runes at load. INERT unless dlc_only
  dlc_only_rune_catchup: false   # turn every rune drop into a Lord's Rune. INERT unless dlc_only

  # --- Pool & Curation --------------------------------------------------------
  location_pool: all             # all(~3900) | trimmed(~2150) | lean(~500). lean recommended for multiworld
  pool_builder: false            # compose pool from an all-game S-tier ladder. injects BASE juice only
  dlc_gear_curation: false       # drop C-tier-and-below base gear; backfill best DLC gear IF enable_dlc (else just drops junk)
  filler_replacement: "off"        # off | runes | stones_and_runes. swap junk filler for economy items
  junk_retention: 12             # 0..100 % of comedy junk to SPARE. INERT unless a scrub path is active (filler_replacement / dlc uplift)
  junk_retention_style: comedy   # comedy | comedy_and_generic | uniform. what counts as sparable junk
  tidy_fun_consumables: false    # pull junk fun-consumables out of the pool (start-grants the few that gate things)
  soft_consumable_shop: false    # keys/hearts -> unlimited Twin Maiden shop. REQUIRES baked rows (patch_baker_soft_consumable_shop)!
  derandomize_gurranq: false     # lock Gurranq ladder vanilla, re-inject the 3 keepers
  derandomize_questlines: "off"    # off | links_only | full. free fill by locking optional NPC-quest links
  soft_progression: false        # demote gate-nothing progression to useful. ONLY helps accessibility full/items; INERT under minimal
  no_spirit_ashes: false         # remove all spirit summons + Spirit Calling Bell from the run
  randomize_enia: true           # (DefaultOn) Roundtable/Enia remembrance turn-ins as checks. off = vanilla

  # --- Progressive Items ------------------------------------------------------
  #  PREFERRED front-end: progressive_items (set). The 4 legacy toggles (bottom) still work and OR-union in.
  progressive_items: []          # subset of: stone_bells, glovewort_bells, flasks, physick
  progressive_bell_count: 15      # 5..40 pool copies of each stone bell. REQUIRES stone_bells active
  progressive_bell_early_count: 4 # 0..10 forced into sphere 1. REQUIRES stone_bells active + dlc_only
  progressive_physick_count: 0    # 0..40 dlc_only guarantee. REQUIRES physick active + dlc_only
  progressive_flask_count: 0      # 0..40 dlc_only guarantee. REQUIRES flasks active + dlc_only
  progressive_flask_early_count: 4 # 0..10 forced into sphere 1. REQUIRES flasks active + dlc_only

  # --- Fill Priority ----------------------------------------------------------
  important_locations: ["Remembrance", "Seedtree", "Church", "Boss", "Fragment", "Revered"]
                                 # force progression onto these types. keys: Remembrance, Seedtree, Basin, Church,
                                 #   Map, Fragment, Cross, Revered, KeyItem, Boss, Shop. keep total < 90 (base) / 120 (DLC).
                                 #   "Boss" is the heaviest -- drop it first on "No more spots to place N items"
  exclude_locations: []          # keys: dlc, hidden, blizzard (wired to location groups)
  excluded_location_behavior: forbid_useful   # allow_useful | forbid_useful | do_not_randomize.
                                 #   NOTE: tight/region-locked pools often need allow_useful to avoid a filler shortage
  missable_location_behavior: forbid_useful   # same values; same allow_useful note
  vanilla_upgrades: []           # lock upgrade families at vanilla (was flask/blessing do_not_randomize). keys: flasks, blessings
  merchant_bell_logic: "off"       # off | logic_only. gate merchant shop checks behind their Bell Bearing
  local_item_option: true        # (DefaultOn) only progression/useful items leak to other players' games
  exclude_local_item_only: ["Weapon", "Armor", "Accessory", "AshofWar"]  # categories that MAY leak (Goods should stay local)

  # --- Sweep ------------------------------------------------------------------
  dungeon_sweep: none            # none | minidungeons | all | bosses. boss death auto-sends a dungeon's remaining checks
  grace_sweep: "off"               # off | complement | full. INERT unless dungeon_sweep: bosses

  # --- Enemy Randomizer -------------------------------------------------------
  enemy_rando: false             # randomize enemies. GATES the 4 below + completion_scaling
  swap_multiboss: false          # REQUIRES enemy_rando
  boss_runes_match: false        # REQUIRES enemy_rando
  impolite_enemies: false        # REQUIRES enemy_rando
  completion_scaling: "off"        # off | flat | gentle | steep | smoothstep. scales w/ OR w/o enemy_rando (scale-only bake pass)
  completion_scaling_floor: 0    # 0..50 % of MaxTier floor. REQUIRES completion_scaling on
  # completion_scaling_basis: geographic  # [Advanced] sphere needs a baker bridge that ISN'T wired -- only geographic applies

  # --- Equipment & QoL --------------------------------------------------------
  auto_equip: false              # auto-equip received armor/weapons
  auto_upgrade: false            # auto-upgrade received weapons to max
  no_weapon_requirements: false  # strip stat reqs -- anything handed to you is usable
  crafting_kit_option: early     # randomize | early | do_not_randomize | start_with
  map_option: give               # randomize | give | do_not_randomize
  smithing_bell_bearing_option: progression_randomize  # randomize | progression_randomize | do_not_randomize (default = progression_randomize)
  spell_shop_spells_only: false  # spell shops carry only spells
  early_legacy_dungeons: false   # early legacy dungeons are early
  material_rando: true           # (DefaultOn) randomize infinitely-spawning materials
  bell_physick_option: start_with  # start_with | do_not_randomize | randomize. Spirit Calling Bell + Physick flask
  death_link: false

  # --- Superseded (use progressive_items above) -------------------------------
  progressive_stone_bells: false     # == progressive_items: [stone_bells]
  progressive_glovewort_bells: false # == progressive_items: [glovewort_bells]
  progressive_flasks: false          # == progressive_items: [flasks]
  progressive_physick: false         # == progressive_items: [physick]

  # --- Advanced & Experimental (off unless you know why) ----------------------
  global_scadutree_blessing: "off" # off | player_only | scaled. EXPERIMENTAL; 'scaled' currently behaves like player_only
  completion_scaling_basis: geographic # geographic | sphere. sphere NOT wired in baker yet
  deathless_routing: false       # exclude the Volcano Manor abduction shortcut from logic
  royal_access: false            # keep Royal Capital graces after it goes ashen
  disable_serpent_hunter_upgrade: false  # niche base-randomizer balance tweak

# =============================================================================
#  CONFLICT CHEAT-SHEET -- the interactions that silently waste your time
# =============================================================================
#
#  GOAL forces other options:
#    ending_condition: messmer  -> FORCES dlc_only ON, messmer_kindle OFF
#    ending_condition: godrick  -> FORCES dlc_only OFF, needs lock-based world_logic
#    dlc_only: true             -> FORCES enable_dlc ON
#
#  "SEAL GOALS" = capital | num_regions>0 | messmer | godrick.
#    While ANY seal goal is active, random_start_region is IGNORED (warns in the gen log).
#    To actually spawn outside Limgrave on a num_regions run, use num_regions_rune_source: pool
#    (NOT random_start_region) -- that moves the hub to Roundtable.
#
#  REQUIRES enemy_rando: true (else silently inert):
#    swap_multiboss, boss_runes_match, impolite_enemies  (completion_scaling has its own scale-only pass -- no enemy_rando needed)
#
#  REQUIRES dlc_only: true (else inert):
#    quick_start, dlc_only_rune_catchup, *_early_count / *_count progressive guarantees
#
#  REQUIRES region gating (region_lock / region_lock_bosses):
#    graces_per_region, grace_rando, region_access, extra_region_locks,
#    num_regions, random_start_region
#
#  OVERLAP / DUPLICATE pairs (pick one mental model):
#    num_regions_order: spine  vs  random     -- fixed first-N spine vs random majors (one knob now)
#    progressive_items  vs  the 4 progressive_* toggles -- set is the front-end; toggles OR-union in
#    vanilla_upgrades -- locks flasks/blessings at vanilla (the old do_not_randomize); to_important folded into important_locations
#
#  KNOWN FOOTGUNS:
#    completion_scaling_basis: sphere              -> not wired in the baker; only geographic actually applies
#    soft_consumable_shop: true                    -> dead unless the baked Twin Maiden rows are deployed
#    grace_rando (on by default)                   -> overrides graces_per_region; set grace_rando:false to use the bundle
#    excluded/missable behavior: forbid_useful     -> can starve a tight region-locked pool; use allow_useful there
#    accessibility: full on a tight locked pool    -> FillError; minimal lets it spill
# =============================================================================
