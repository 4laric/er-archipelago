# ER Archipelago -- GODRICK mini-campaign (shortest base-game run). 2026-06-17.
#
# Scope: keep ONLY Limgrave, Weeping Peninsula and Stormveil Castle (+ the always-open hub);
# everything else in the base game -- and all DLC -- is sealed. Goal = defeat Godrick the Grafted.
# Drives the SAME _spine_* seal path + region_lock machinery as the (gen-tested) Messmer goal.
#
# DLC is OFF here on purpose: a pure base-game short run, no DLC install dependency, smallest pool.
#
# HOW TO GEN (solo): make this the ONLY file in Archipelago\Players\ (move the dlc-only yaml out),
# then a clean enemy-OFF rebuild (do NOT use plain -All -- it forces -Enemies):
#   .\build.ps1 -Randomizer -Generate -Serve -Bake -Deploy -Preflight     # NO -Enemies
# Check the timestamped gendiag_*.txt for "ending_condition: godrick" + a clean fill before baking.
#
# FOR A SYNC handed to a third-party host: rebuild eldenring.apworld first -- the checked-in
# .apworld is STALE (only ending_condition 0-3, no godrick). If YOU host/gen from this repo's
# Archipelago\worlds\ source, that doesn't matter.

name: Alaric
description: ER AP Godrick mini-campaign -- Limgrave/Weeping/Stormveil only, base game, region_lock, defeat Godrick.
game: EldenRing

EldenRing:
  enable_dlc: false           # base-game-only short run (godrick seals DLC wholesale anyway)
  dlc_only: false             # forced off by the godrick goal regardless; explicit for clarity
  ending_condition: godrick   # keep front 3 steps, end at Godrick the Grafted

  enemy_rando: false          # explicitly OFF (plain -All would force it on)

  world_logic: region_lock    # REQUIRED by godrick -- per-region lock items seal the world

  # Small 3-region pool: keep the location count high so the few progression/lock items have room.
  # Leave location_pool unset (= full) and auto_upgrade off (keeps the ~stone checks as locations).
  auto_upgrade: false

  # Avoid a filler shortage in the reduced pool.
  missable_location_behavior: allow_useful
  excluded_location_behavior: allow_useful

  # MUST live under EldenRing: -- at document root AP silently ignores these.
  accessibility: minimal
  progression_balancing: 50
