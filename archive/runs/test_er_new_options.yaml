# Elden Ring AP test YAML — exercises every option added in the 2026-06-13 batch.
# Purpose: confirm the rebuilt apworld loads, the new options parse, and a seed GENERATES.
# Drop this in your Archipelago Players/ folder and run the generator.
#
# Coverage (each new option set to a non-default value where safe):
#   Tier A enemy flags ..... swap_multiboss / boss_runes_match / impolite_enemies (need enemy_rando)
#   standalone bake tweak .. disable_serpent_hunter_upgrade
#   Tier B great runes ..... great_runes_final_boss / great_runes_mountaintops
#   important-locations .... multi-class fix (Remembrance + Map both apply now)
#   enabler items .......... bell_physick_option = start_with
#   flask upgrades ......... flask_upgrade_option = to_important  (priority path)
#   blessings (DLC) ........ blessing_option = do_not_randomize   (lock + priority-removal)
#   deathless .............. deathless_routing = true
#
# Priority-location budget note: important_locations (Remembrance+Map ~49) + flask to_important
# (seedtree+church ~45) ~= ~94, under the ~120 DLC budget. If you want to stress the new
# `Boss` priority class, add `- Boss` below and consider trimming another class to stay in budget.

name: Player1
description: Verifies the new ER apworld options generate cleanly.
game: EldenRing

EldenRing:
  # DLC on so blessing_option and DLC logic are exercised
  enable_dlc: true

  # Tier A enemy-rando sub-toggles (only take effect with the enemy randomizer on)
  enemy_rando: true    # enemy rando + DLC WORKS (playtest 2). The crash was the swap/rune toggles below, not this.
  swap_multiboss: false      # CRASHES with DLC enemy rando (v0.8 scaling untested vs DLC, EnemyRandomizer.cs:8202); fine on base game
  boss_runes_match: false    # suspect (swaprewards "no runes to move" right before the crash)
  impolite_enemies: false    # disabled to isolate; likely innocent (aggression only)

  # Standalone bake tweak (independent of enemy rando)
  disable_serpent_hunter_upgrade: true

  # Tier B — Great Rune thresholds (0 = no requirement)
  great_runes_required: 2
  great_runes_final_boss: 2
  great_runes_mountaintops: 1

  # important_locations: with the break-bug fixed, BOTH classes now apply (was Remembrance-only)
  important_locations:
    - Remembrance
    - Map

  # Enabler items inert on their own -> hand them over at the start
  bell_physick_option: start_with

  # Flask upgrades (Golden Seeds + Sacred Tears) -> force their locations to hold progression
  flask_upgrade_option: to_important

  # Shadow Realm blessings (Scadu Fragments + Revered Ashes) -> lock at vanilla (DLC)
  blessing_option: do_not_randomize

  # Exclude the Volcano Manor abduction (death shortcut) from logic
  deathless_routing: true

  # A couple of existing knobs pinned for a deterministic test run
  world_logic: open_world
  ending_condition: elden_beast

# AP-core options (defaults are fine; pinned here for reproducibility)
progression_balancing: 50
accessibility: full
