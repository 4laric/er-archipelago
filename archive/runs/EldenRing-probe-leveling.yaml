# ER Archipelago -- PROBE TEST: skip-Melina leveling flag. 2026-06-16.
# Minimal base-game seed whose only job is to get you in-world FAST, at a fresh pre-Melina save,
# with nothing region-locked between you and the first Site of Grace -- so you can run the
# /getflag /setflag probe from PROBE-leveling-flag.md and find the flag that enables "Level Up".
#
# WHY these settings:
#   enable_dlc=false   -> fastest gen/bake, and vanilla Melina flow (leveling stays OFF until the
#                         accord) -- exactly the pre-Melina baseline we need to test against.
#   world_logic=open   -> no region locks; walk straight to a grace and open the menu.
#   location_pool=lean -> smallest footprint, quickest gen/bake/deploy loop.
#   No enemy_rando / sweeps / DLC -> nothing that complicates a clean boot.
#
# PRE-REQ (one-time): the probe commands must exist in the DEPLOYED client.
#   If /setflag /getflag aren't in your current build:
#       python patch_client_flagcmds.py
#       .\build.ps1 -Client        # build the client once so the commands ship
#
# IMPORTANT: Players\ already contains EldenRing-bosssweep-test.yaml. Move it out before generating,
# or AP will build a 2-player multiworld. This probe wants to be the ONLY EldenRing yaml in Players\.
#
# RUN (need to be in-world, so bake + deploy -- gen-only won't do):
#   .\build.ps1 -Generate -Serve -Bake -Deploy -Preflight     # NO -Enemies
#   -> fully restart Elden Ring, connect.
#   -> new character, rest at the first grace (The First Step). Melina has NOT appeared yet = Save B.
#   -> follow PROBE-leveling-flag.md: diff the flag cluster, then set->readback->rest->check Level Up.

name: Alaric
description: ER AP probe test -- minimal base-game seed for finding the skip-Melina leveling flag.
game: EldenRing

EldenRing:
  enable_dlc: false              # base game only: fastest loop + vanilla Melina flow (leveling OFF until accord)
  dlc_only: false
  ending_condition: final_boss   # irrelevant for a probe; default
  world_logic: open_world        # nothing locked -- reach a grace and open the menu immediately
  location_pool: lean            # smallest footprint, fastest gen/bake/deploy

  enemy_rando: false             # keep the boot clean
  material_rando: false
  dungeon_sweep: none
  grace_sweep: off
  dlc_gear_curation: false
  auto_upgrade: false

  bell_physick_option: start_with   # spawn with Spirit Calling Bell + Flask of Wondrous Physick

  # Must live under EldenRing: (root-level AP options are ignored there).
  accessibility: minimal         # fastest fill -- only beatability required
  progression_balancing: 50
