# ER Archipelago -- DLC-ONLY + BOSS SWEEP run, item requirements OFF. 2026-06-16.
# = the gated DLC-only run (Land of Shadow only, region_lock + Messmer gate, enemy_rando OFF)
#   PLUS the total boss attribution sweep + grace complement, PLUS no weapon/stat requirements.
#
# Boss sweep here runs the enemy_rando=FALSE path: boss positions come from drop-checks
# (apEntityPos) with a live-MSB fallback for bosses that don't drop a check. Verify in
# ap_sweep_diag that unattributed ~= 0 and DLC DefeatFlags (20/21/22xxxxxx) appear among boss flags.
#
# CLEAN REBUILD (enemy-OFF -- do NOT use plain -All, which forces -Enemies):
#   1. (one-time) restore vanilla game files to clear the last enemy/BossSweep bake's MSBs (see
#      EldenRing-dlc-only-RUN.yaml header for the Copy-Item block).
#   2. python patch_client_warp.py   # if not already applied
#   3. .\build.ps1 -Randomizer -Client -Generate -Serve -Bake -Deploy -Preflight   # NO -Enemies
#   4. fully restart Elden Ring, connect, then in the client console:  /warp 68000

name: Alaric
description: ER AP DLC-only + boss sweep, no weapon requirements -- Land of Shadow, region_lock + Messmer gate, PCR goal.
game: EldenRing

EldenRing:
  enable_dlc: true            # forced on by dlc_only anyway; set explicitly for clarity
  dlc_only: true              # pool = DLC only, base = transit (no checks)
  ending_condition: final_boss   # Promised Consort Radahn (Circlet of Light)

  enemy_rando: false          # OFF for this run (DLC enemy crash, TODO #1)

  # --- BOSS SWEEP (NEW) ---
  dungeon_sweep: bosses       # total boss attribution -> emits apconfig sweep_flags
  grace_sweep: complement     # grace fills sparse-field-boss gaps (first of {boss,grace} wins)

  # --- ITEM REQUIREMENTS OFF ---
  no_weapon_requirements: true   # remove ALL stat requirements from weapons, ammo, and spells

  # Messmer's Kindling shard gate = the progression spine.
  messmer_kindle: true
  messmer_kindle_required: 5
  messmer_kindle_max: 10

  auto_upgrade: false         # keep ~117 stone checks so the 22 locks + 10 shards seat in-world
  dlc_gear_curation: true     # backfill best S/A DLC gear into received items
  scadu_frontload: 25         # front-load ~half the Scadutree Fragments into sphere 1
  world_logic: region_lock    # per-region lock items give real spheres

  # allow_useful keeps the pool from running short of filler.
  missable_location_behavior: allow_useful
  excluded_location_behavior: allow_useful

  accessibility: minimal
  progression_balancing: 50
