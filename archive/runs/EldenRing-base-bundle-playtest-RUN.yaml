# ER Archipelago -- FULL BASE-GAME bundle/QoL playtest. 2026-06-18.
# Goal: exercise the new minor-dungeon BUNDLE LOCKS + grace-on-receipt + warp-access + pickup
# notifications across a whole base-game region_lock run (Limgrave -> ... -> Elden Beast), with QoL
# maxed so it's actually pleasant to play. Base game only (enable_dlc off).
#
# ============================ APPLY PATCHES FIRST (Windows, repo root) ============================
# Order matters. The checked-in apworld is STALE -- gen from Archipelago\worlds\eldenring source.
#   --- source hygiene (run first) ---
#     python patch_dedupe_stormveil_lock.py          # collapse the duplicate Stormveil Lock item
#   --- QoL / pool (your usual) ---
#     python patch_pool_builder.py
#     python patch_progressive_consumables.py
#     python patch_apworld_grace_arena_exclude.py
#     python patch_no_spirit_ashes.py
#     python patch_morne_carve.py                    # REQUIRED for extra_region_locks: castle_morne
#   --- the bundle locks (THIS session's work) ---
#     python patch_apworld_liurnia_caves.py          # opt-in liurnia_caves (now opt-in, was always-on)
#     python patch_apworld_altus_caves_lock.py       # opt-in altus_caves
#     python patch_apworld_mountaintops_caves_lock.py# opt-in mountaintops_caves
#     python patch_apworld_limgrave_caves_lock.py    # opt-in limgrave_caves (renamed from _underground)
#     python patch_apworld_bundle_lock_graces.py     # grant each bundled dungeon's entrance grace on receipt
#     python patch_apworld_bundle_warp_access.py     # warp logic for the bundles (needs region_access: warp)
#     python patch_apworld_bundle_lock_notify.py     # name the area's map in the pickup ticker (option B)
#
# *** GEN-TEST BEFORE BAKING. *** This stacks the whole bundle batch for the first time. Run a
# gen-only pass and confirm the spoiler before the full bake:
#     .\build.ps1 -Randomizer -Generate
# Expect in the spoiler: "Liurnia Caves Lock", "Altus Caves Lock", "Mountaintops Caves Lock",
# "Limgrave Caves Lock" as progression items gating their dungeons. If gen fails, peel back
# the newest bundle patch first. Then the full enemy-OFF bake (NO -Enemies):
#     .\build.ps1 -Randomizer -Generate -Serve -Bake -Deploy -Preflight
#
# IN-GAME THINGS TO CHECK:
#  - Receiving a bundle lock pops "Map: <area>" in the ticker (not a bare Golden Rune [1]).
#  - That lock lights the entrance graces of all its bundled dungeons (warp menu).
#  - With region_access: warp you can warp straight into a bundle's dungeons on holding its lock.
#  - No grace warps you into a wall / lethal lift (the grace-arena-exclude + bundle grace lists).

name: Alaric
description: ER AP base-game BUNDLE playtest -- Liurnia/Altus/Mountaintops/Limgrave underground locks + grace-on-receipt + warp access + pickup notify, region_lock warp, QoL maxed, defeat the Elden Beast.
game: EldenRing

EldenRing:
  enable_dlc: false
  dlc_only: false
  enemy_rando: false
  ending_condition: elden_beast      # full base run (reach + beat the Elden Beast)
  world_logic: region_lock

  # --- region-lock access model (the QoL that makes a full region_lock run pleasant) ---
  region_access: warp                # lock alone = access; warp straight in (exercises bundle-warp patch)
  graces_per_region: 0               # 0 = ALL graces in a region unlock on its lock (max warp coverage)

  # --- the bundle locks under test (Liurnia Caves is always-on; these are the opt-in ones) ---
  extra_region_locks:
    - liurnia_caves                  # 8 regions / 86 checks
    - limgrave_caves                 # 10 regions / 75 checks
    - altus_caves                    # 6 regions / 53 checks
    - mountaintops_caves             # 6 regions / 71 checks
    - castle_morne                   # granular Castle Morne (you have the carve patch)

  # --- pool (NOTE: real key is location_pool, NOT item_pool) ---
  location_pool: all                 # full pool so the locks behave correctly (trimmed risks lock-spill; see notes)
  pool_builder: true
  pool_builder_dlc_gear: false       # DLC off -> no DLC gear to inject

  # --- progressive upgrades ---
  progressive_flasks: true
  progressive_glovewort_bells: true
  progressive_stone_bells: true
  progressive_bell_count: 10

  # --- sweep (lighter than 'bosses' to isolate the bundle behavior; bump to bosses if you want) ---
  dungeon_sweep: minidungeons        # bundle dungeons sweep on their boss; low blast radius

  # --- QoL / usability ---
  no_weapon_requirements: true       # use anything the pool hands you
  early_leveling: true               # level at graces from the start, skip Melina
  auto_upgrade: true                 # received/found gear auto-scales
  no_spirit_ashes: true              # drop spirit summons + the buggy Spirit Calling Bell
  torrent_start: on                  # guaranteed Torrent from the start (region_lock can skip Melina)
  map_option: give                   # reveal all maps (default anyway; explicit here)

  # filler-bearing pickups get scrubbed by pool builder / progressive; allow_useful avoids a shortage
  missable_location_behavior: allow_useful
  excluded_location_behavior: allow_useful

  accessibility: minimal
  progression_balancing: 0           # solo playtest -> no need to reshuffle for balance
