name: Test

# The apworld had NO CI at all. The client got a runner on 2026-07-12 and it immediately caught three
# compile errors that had been sitting on main; this repo is the same blind spot one repo over. Today's
# Windows build broke because `tools/gen_location_regions.py` still called the retired
# `contract.is_big_ticket` -- a rename an AP-free tool could not follow. That is a ten-second failure on
# a runner and it cost a build round-trip through Alaric instead.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # AP pins its own deps at import time and will try to self-update mid-test without this.
  SKIP_REQUIREMENTS_UPDATE: "1"

jobs:
  # ---------------------------------------------------------------------------------------------
  # 1. The apworld test suite, run inside a real Archipelago tree (the world is a package under
  #    worlds/, so it can only be imported from there -- `from ..location_tags import ...`).
  # ---------------------------------------------------------------------------------------------
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The AP pin lives in ONE place -- .ap-version -- read here AND by bootstrap-ap.ps1, so the version
      # you develop against and the version CI gates on cannot drift apart. An unpinned clone would mean a
      # green main can go red overnight on someone else's commit, which trains everyone to ignore the badge.
      - name: Read the Archipelago pin
        id: ap
        run: echo "version=$(cat .ap-version)" >> "$GITHUB_OUTPUT"

      - name: Check out stock upstream Archipelago
        uses: actions/checkout@v4
        with:
          repository: ArchipelagoMW/Archipelago    # UPSTREAM. Never a fork -- see bootstrap-ap.ps1.
          ref: ${{ steps.ap.outputs.version }}
          # NOT `Archipelago`: this repo already has a submodule at that exact path, and the second
          # checkout collided with it ("Entering 'Archipelago'" -> git bailed).
          path: _ap

      - name: Install Archipelago's requirements
        run: |
          python -m pip install --upgrade pip
          # AP 0.6.x is not compatible with setuptools >= 80 (pkg_resources removal).
          pip install "setuptools<80"
          pip install -r _ap/requirements.txt
          pip install pytest

      # ONE HARNESS, used here and by run_ci.ps1 on the dev box. It used to be two: CI installed the
      # world into a freshly-checked-out upstream AP, while run_ci.ps1 installed it into <repo>\Archipelago
      # -- whatever that happened to be. On 2026-07-13 that directory was a clone of fswap/Archipelago
      # (Bedrock's fork, kept for playtesting his seeds), so the dev box was gating the apworld against a
      # different Archipelago than CI: 661 tests collected vs 686, a different Fill.py, different spheres,
      # and a test that is green here failed there. tools/gf_test.py is now the only definition of the
      # harness -- it pins .ap-version, REFUSES to run against a fork, and installs (never symlinks).
      - name: pytest (tools/gf_test.py -- pinned upstream AP)
        run: python tools/gf_test.py --ap-dir _ap

  # ---------------------------------------------------------------------------------------------
  # 2. The AP-FREE generators. These need no Archipelago and no game artifacts -- only committed
  #    greenfield data -- so CI can run them, and they are precisely what broke the Windows build.
  #    Two failure modes, both caught here:
  #      a) the generator CRASHES (the is_big_ticket rename)
  #      b) the generator runs but its committed OUTPUT is STALE (someone changed the data and never
  #         regenerated) -- caught by failing on a non-empty git diff.
  # ---------------------------------------------------------------------------------------------
  generators:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Check the CLIENT out directly rather than via `submodules:`. gen_location_regions writes into
      # it, and a direct checkout keeps this job independent of the superproject's gitlink (which points
      # at a pinned commit, not necessarily client main).
      - uses: actions/checkout@v4
        with:
          repository: 4laric/from-software-archipelago-clients
          path: from-software-archipelago-clients

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generators run, and their committed output is not stale
        run: |
          python tools/gen_location_regions.py
          python tools/gen_region_locks.py
          python greenfield/gen_contract.py

          # Check the two things that are actually GENERATED OUTPUT, in the two places they live.
          #
          # Do NOT just `git diff` the superproject: we check the client out at its OWN main (above),
          # not at the pinned gitlink, so the gitlink ALWAYS shows as modified. Failing on that would
          # be a permanent red herring that says "stale generator" when it means "gitlink not bumped".
          fail=0
          if ! git diff --quiet -- . ':(exclude)from-software-archipelago-clients'; then
            echo "::error::apworld generated output is STALE -- regenerate and commit:"
            git --no-pager diff --stat -- . ':(exclude)from-software-archipelago-clients'
            fail=1
          fi
          # The CROSS-REPO artifacts (tracker_regions.rs, contract_gen.rs) are written INTO the client.
          # This is the check that catches an apworld change that never reached the client.
          if ! git -C from-software-archipelago-clients diff --quiet; then
            echo "::error::client-side generated output is STALE -- regen and push the CLIENT too:"
            git -C from-software-archipelago-clients --no-pager diff --stat
            fail=1
          fi
          exit $fail
