# ER Archipelago -- GODRICK mini-campaign, POOL-BUILDER + TRIMMED. 2026-06-17.
#
# Same as EldenRing-godrick-curated-RUN.yaml, but location_pool: trimmed instead of all --
# a much shorter check list (drops low-value filler pickups + collapses each armor set to one
# check) while the pool builder still recomposes the survivors from whole-game juice. This is
# the A/B against the ~781-check 'all' run: expect this to land in the low hundreds.
#
# REQUIRES all three apworld patches applied first, from repo root:
#     python patch_pool_builder.py
#     python patch_pool_builder_dlc_gear.py        # only if you keep pool_builder_dlc_gear: true
#     python patch_progressive_consumables.py      # <-- the one missing from the last gen
#
# Why trimmed pairs especially well here:
#   - Armor-set collapse + filler drop happen at the LOCATION level (fewer, denser checks).
#   - progressive_flasks / progressive_glovewort_bells deliver the flask + glovewort LADDERS as
#     single progressive items instead of scattering ~40 raw Golden Seed / Sacred Tear / bell
#     checks -- exactly the trade the progressive items are for. (Trimmed keeps S/A spells and
#     smithing-stone checks; auto_upgrade still ratchets off stones you turn in.)
#
# *** Check the gendiag BEFORE baking ***
#   - ending_condition: Godrick ; Location Pool Size: Trimmed ; Pool Builder: Yes.
#   - precollected-to-start: NONE. Trimmed is a smaller pool, so the few region locks
#     (Limgrave / Weeping / Stormveil) have less room -- if any spill to starting inventory,
#     region_lock is nullified. Levers if they spill: location_pool: all (the proven config),
#     or auto_upgrade: false to keep more stone checks as room.
#   - log: NO "is not a valid option name" lines for progressive_flasks /
#     progressive_glovewort_bells (that was the tell last time that the consumables patch
#     hadn't been applied). Spoiler should show Progressive Golden Seed / Sacred Tear /
#     Grave-/Ghost-Glovewort Bell items, and DLC S/A gear if pool_builder_dlc_gear stays on.
#
# APWORLD-ONLY -- NO client rebuild. Gen + bake is enough. Make this the ONLY EldenRing yaml in
# Archipelago\Players\, then (no -Enemies):
#     .\build.ps1 -Randomizer -Generate -Serve -Bake -Deploy -Preflight

name: Alaric
description: ER AP Godrick mini-campaign, POOL-BUILDER + TRIMMED -- Limgrave/Weeping/Stormveil only, base game, trimmed checks, all-game composed pool + progressive flasks/glovewort, region_lock, defeat Godrick.
game: EldenRing

EldenRing:
  enable_dlc: false           # base-game-only short run (godrick seals DLC wholesale anyway)
  dlc_only: false             # forced off by the godrick goal regardless; explicit for clarity
  ending_condition: godrick   # keep front 3 steps, end at Godrick the Grafted

  enemy_rando: false          # explicitly OFF (plain -All would force it on)

  world_logic: region_lock    # REQUIRED by godrick -- per-region lock items seal the world

  # --- shorter check list ---
  location_pool: trimmed      # drop low-value filler checks + collapse armor sets to 1 check each

  # --- the all-game pool builder ---
  pool_builder: true          # compose the surviving pool from a whole-game ladder
  pool_builder_dlc_gear: true # also inject DLC S/A gear (needs the DLC installed in-game to grant;
                              #   set false for a pure no-DLC-dependency run)
  auto_upgrade: true          # received/found gear auto-scales (trimmed keeps stone checks anyway)

  # --- progressive consumable upgrades ---
  progressive_flasks: true            # Golden Seed + Sacred Tear -> 2 progressive items
  progressive_glovewort_bells: true   # 6 glovewort bell bearings -> 2 progressive ladders
  progressive_stone_bells: true       # 9 Miner's bell bearings -> 2 progressive ladders
  progressive_bell_count: 6           # pool copies per stone bell

  # Trimmed strips filler-bearing pickups, so default forbid_useful on missable/excluded runs
  # the pool short ('Not enough filler items'). allow_useful is REQUIRED for any trimmed bake.
  missable_location_behavior: allow_useful
  excluded_location_behavior: allow_useful

  # MUST live under EldenRing: -- at document root AP silently ignores these.
  accessibility: minimal
  progression_balancing: 50
