# ============================================================================
#  ELDEN RING ARCHIPELAGO  --  "THE SHATTERING"  (flagship template, v0.1)
# ============================================================================
#
#  The headline way to play. Instead of the whole open world being available at
#  once, the Lands Between is SHATTERED into a handful of regions. You start in
#  Limgrave; every other region's key arrives as an Archipelago item. Find a
#  region's key, warp in, clear its checks, send items out -- until you hold
#  Leyndell and put down Morgott. A tight ~3-4 hour run.
#
#  The one option that turns ER into an Archipelago game is `num_regions`.
#  Everything else is a sensible default. Change `name` and you have a valid seed.
#
#  HOW TO USE: drop this file in your Archipelago `Players/` folder and generate.
#  See SETUP.md for the full walkthrough.
# ============================================================================

name: Player1
description: ER Archipelago -- The Shattering (Capital run, region-locked, ~3-4h)
game: EldenRing

EldenRing:

  # ---- The Shattering (the headline) -------------------------------------
  num_regions: 4                # how many overworld majors stay in play; the rest
                                #   are sealed. Limgrave (start), Altus (the road up)
                                #   and Leyndell + Morgott (the goal) are always kept,
                                #   so 3 is the minimum. 4 = those + 1 random region.
                                #   Raise toward 9 for a longer shatter.
  great_runes_required: 2       # Great Runes needed to enter Leyndell; the shatter
                                #   keeps or injects enough rune bosses to satisfy it.
  dungeon_sweep: all            # auto-collect a dungeon's leftover checks once cleared
  boss_lock_placement: "own_region"  # a region's key is found inside that same region

  ending_condition: capital     # reach Leyndell, defeat Morgott the Omen King
  world_logic: region_lock      # each region needs its own key item -> real spheres
  region_access: warp           # a region's own key is enough; fast-travel straight in
  grace_rando: false            # a region's key lights all of its graces at once

  # ---- Quality of life ----------------------------------------------------
  quick_start: true             # Lord's Runes at start so you can level immediately
  early_leveling: true          # Level Up granted at start; no need to meet Melina
  no_weapon_requirements: true  # anything the multiworld hands you is usable, any build
  no_spirit_ashes: true         # no Spirit Ashes or (currently unusable) Calling Bell
  auto_upgrade: true            # received weapons arrive at max upgrade level
  flatten_regular_upgrades: true  # one smithing stone per weapon upgrade, not 2/4/6

  # ---- Item pool ----------------------------------------------------------
  curated_fill: true            # concentrate progression on big-ticket checks (bosses,
                                #   remembrances, key items, churches, seed trees, maps)
                                #   so ER doesn't swamp a small multiworld. With
                                #   num_regions the fill is tight, so this can rarely
                                #   FillError on a single seed -- a normal gen retries
                                #   and recovers. Drop it if you ever see gen churn.
  filler_upgrade_pct: 0         # keep 0: upgrading the whole filler pool is fill-unsafe.
                                #   pool_builder already upgrades your junk safely.
  filler_foreign_pct: 15        # % of your filler opened to other worlds' filler in a
                                #   multiworld. Inert solo. 0 = all local, 100 = fully open.
  pool_builder: true            # smarter, more even spread of useful items across spheres
  pool_builder_intensity: high  # how hard to scrub filler to fund upgrades: normal /
                                #   high / max. high also scrubs low-value goods
                                #   (spells preserved); max also scrubs B-tier gear.
  junk_retention: 0             # % of comedy junk kept for flavor; 0 scrubs it all
  excluded_location_behavior: "allow_useful"  # excluded spots may hold useful, not just filler
  missable_location_behavior: "allow_useful"  # missable spots may hold useful items too

  # ---- Difficulty scaling -------------------------------------------------
  completion_scaling_floor: 0   # scaling is always on (by sphere); 0 lets early regions
                                #   stay tier 1. Raise toward 50 to lift the early floor.

  death_link: false             # flip to true for shared deaths (works both directions)

  # ---- DLC ----------------------------------------------------------------
  enable_dlc: false             # KEEP OFF for v0.1. The DLC / Land of Shadow path is
                                #   largely untested -- base-game (DLC off) is the
                                #   recommended, supported way to play. The Messmer DLC
                                #   variant in SETUP.md is experimental; expect rough edges.

  # ---- Archipelago common (keep indented under EldenRing:) ----------------
  accessibility: minimal        # region_lock seeds want minimal, not full
  progression_balancing: 50
